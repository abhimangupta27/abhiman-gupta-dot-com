<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abhiman Gupta</title>
  <style>
    @font-face {
      font-family: FoundersGroteskCondensed;
      src: url('fonts/FoundersGroteskCondensed/FoundersGroteskCondensed-Medium.otf');
      font-weight: 500;
    }
    @font-face {
      font-family: EditorialNewUltralight;
      src: url('fonts/EditorialNew/EditorialNew-Ultralight.otf');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --border: #e8e8e4;
      --text: #000000;
      --muted: #888;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.7;
    }

    a { color: var(--text); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* SITE NAME */
    .site-name {
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      padding: 10px 16px 0.2em;
      font-family: FoundersGroteskCondensed, 'Arial Narrow', sans-serif;
      font-size: clamp(3.2rem, 10.5vw, 9.5rem);
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      background: transparent;
    }
    .site-name:hover { text-decoration: none; }

    .nav-extra { opacity: 0; transition: opacity 0.3s; }

    /* TOP BAR — solid white strip at name height, full width */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 98;
      pointer-events: none;
      background: #fff;
    }
    /* TOP FADE — gradient fade below bar, text side only */
    .top-fade {
      position: fixed;
      top: 0; left: 0;
      width: calc(100% - clamp(280px, 45vw, 640px) - 2rem);
      z-index: 99;
      pointer-events: none;
      background: linear-gradient(to bottom, #fff 0%, #fff 40%, transparent 100%);
    }

    /* HERO */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      padding: calc(clamp(3.2rem, 10.5vw, 9.5rem) + 7rem) 16px 0;
      gap: 2rem;
    }

    .hero-left {
      width: clamp(280px, 45vw, 640px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .hero-left p {
      font-family: EditorialNewUltralight, Georgia, serif;
      font-style: italic;
      font-size: clamp(1.77rem, 3.3vw, 2.83rem);
      font-weight: 300;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 1.4em;
    }
    .hero-left p:last-of-type { margin-top: auto; margin-bottom: 0; }

    .hero-right {
      flex: 0 0 auto;
      width: clamp(280px, 45vw, 640px);
      aspect-ratio: 1 / 1;
      background: #f0efed;
      overflow: hidden;
    }
    .hero-right img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* DIVIDER */
    hr {
      border: none; border-top: 1px solid var(--border);
      margin: 3rem 16px 0;
    }

    /* SECTION */
    .section { padding: 4rem 16px 4rem; }
    .section-title {
      font-family: FoundersGroteskCondensed, 'Arial Narrow', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 0.9;
      margin-bottom: 2rem;
    }
    .section-body {
      font-family: EditorialNewUltralight, Georgia, serif;
      font-style: italic;
      font-size: clamp(1.1rem, 1.8vw, 1.4rem);
      line-height: 1.5;
      max-width: 640px;
    }
    .section-body p { margin-bottom: 1em; }

    /* CAPTCHA */
    #email-reveal {
      font-family: EditorialNewUltralight, Georgia, serif;
      font-style: italic;
      font-size: clamp(1.1rem, 1.8vw, 1.4rem);
    }
    #captcha-trigger {
      color: var(--text); cursor: pointer; background: none;
      border: none; font: inherit; padding: 0;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    #captcha-trigger:hover { border-color: var(--text); text-decoration: none; }
    #captcha-box {
      display: none; margin-top: 1.5rem;
      align-items: baseline; gap: 0.8rem; flex-wrap: wrap;
    }
    #captcha-box.visible { display: flex; }
    #captcha-question {
      font-family: EditorialNewUltralight, Georgia, serif;
      font-style: italic;
      font-size: clamp(1.1rem, 1.8vw, 1.4rem);
      color: var(--text);
    }
    #captcha-input {
      width: 3rem; padding: 0.3rem 0;
      border: none; border-bottom: 1px solid var(--border);
      border-radius: 0;
      font-family: FoundersGroteskCondensed, 'Arial Narrow', sans-serif;
      font-size: 1.2rem; color: var(--text);
      background: transparent; text-align: center;
      letter-spacing: 0.05em;
    }
    #captcha-input:focus { outline: none; border-color: var(--text); }
    #captcha-submit {
      background: none; border: none; border-bottom: 1px solid var(--border);
      border-radius: 0; padding: 0.3rem 0;
      font-family: FoundersGroteskCondensed, 'Arial Narrow', sans-serif;
      font-size: 0.9rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    #captcha-submit:hover { color: var(--text); border-color: var(--text); }
    #captcha-error {
      color: #c0392b; display: none;
      font-family: EditorialNewUltralight, Georgia, serif;
      font-style: italic;
      font-size: clamp(0.9rem, 1.4vw, 1.1rem);
    }
    #email-result { display: none; }
    #email-result a {
      font-family: EditorialNewUltralight, Georgia, serif;
      font-style: italic;
      font-size: clamp(1.1rem, 1.8vw, 1.4rem);
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    #email-result a:hover { border-color: var(--text); text-decoration: none; }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #02040d;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #loader.hidden { display: none; }
    #loader canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #loader svg {
      position: relative;
      z-index: 1;
      width: min(95vw, 900px);
      background: transparent;
    }

    .lens-glass {
      fill: url(#glass);
      stroke: rgba(202, 239, 255, 0.95);
      stroke-width: 0.8;
      filter: drop-shadow(0 0 7px rgba(111, 217, 255, 0.62));
    }
    .focal-flare { fill: #eafcff; filter: drop-shadow(0 0 8px #9feaff); }

    /* Ray paths */
    .ray {
      fill: none;
      stroke: #a9e9ff;
      stroke-width: 1.15;
      stroke-linecap: round;
      filter: drop-shadow(0 0 5px rgba(126, 221, 255, 0.82));
    }
    .ray-1 {
      stroke-dasharray: 160;
      stroke-dashoffset: 160;
      animation: draw-ray 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }
    .ray-2 {
      stroke-dasharray: 160;
      stroke-dashoffset: 160;
      animation: draw-ray 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }
    .ray-3 {
      stroke-dasharray: 160;
      stroke-dashoffset: 160;
      animation: draw-ray 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.0s forwards;
    }
    .ray-4 {
      stroke-dasharray: 160;
      stroke-dashoffset: 160;
      animation: draw-ray 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
    }
    .ray-5 {
      stroke-dasharray: 160;
      stroke-dashoffset: 160;
      animation: draw-ray 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.8s forwards;
    }
    @keyframes draw-ray {
      to { stroke-dashoffset: 0; }
    }


    /* Lock scroll during load */
    html.loading { overflow: hidden; }

    /* FOOTER */
    footer {
      text-align: center; padding: 1.5rem 2rem;
      font-size: 0.75rem; color: var(--muted);
    }

    /* TIMELINE */
    .timeline {
      max-width: 640px;
    }
    .timeline-entry {
      padding-bottom: 2.5rem;
    }
    .timeline-entry:last-child {
      padding-bottom: 0;
    }
    .timeline-year {
      font-family: FoundersGroteskCondensed, 'Arial Narrow', sans-serif;
      font-size: clamp(0.75rem, 1vw, 0.9rem);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }
    .timeline-year::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .timeline-role {
      font-family: EditorialNewUltralight, Georgia, serif;
      font-style: italic;
      font-size: clamp(1.35rem, 2.4vw, 1.9rem);
      line-height: 1.3;
    }

    /* LINKS */
    .links-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .link-icon {
      display: block;
      color: var(--text);
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .link-icon:hover {
      opacity: 1;
      text-decoration: none;
    }
    .link-icon svg {
      display: block;
      width: 42px;
      height: 42px;
    }

    @media (max-width: 700px) {
      .hero { flex-direction: column; padding-top: calc(clamp(3.2rem, 10.5vw, 9.5rem) + 3.5rem); }
      .hero-right { width: 100%; }
    }
  </style>
</head>

<script>
  // Loader: lock scroll, then disintegrate after ray animation
  document.documentElement.classList.add('loading');

  setTimeout(function() {
    var loader = document.getElementById('loader');
    var svg = loader.querySelector('svg');
    var canvas = document.getElementById('loader-canvas');
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);

    // Map SVG coordinates to screen coordinates
    var svgRect = svg.getBoundingClientRect();
    var vb = svg.viewBox.baseVal;
    function svgToScreen(sx, sy) {
      return {
        x: svgRect.left + (sx - vb.x) / vb.width * svgRect.width,
        y: svgRect.top + (sy - vb.y) / vb.height * svgRect.height
      };
    }

    // Sample points along all SVG paths
    var paths = svg.querySelectorAll('path');
    var particles = [];
    for (var i = 0; i < paths.length; i++) {
      var path = paths[i];
      var len = path.getTotalLength();
      var step = 3; // sample every 3 SVG units
      for (var d = 0; d < len; d += step) {
        var pt = path.getPointAtLength(d);
        var screen = svgToScreen(pt.x, pt.y);
        var angle = Math.random() * Math.PI * 2;
        var speed = 0.75 + Math.random() * 1.5;
        particles.push({
          x: screen.x,
          y: screen.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 0.75,
          size: 1.5 + Math.random() * 2,
          alpha: 1,
          decay: 0.01 + Math.random() * 0.01
        });
      }
    }

    // Hide SVG, remove loader background so canvas controls visibility
    svg.style.display = 'none';
    loader.style.background = 'none';
    loader.style.pointerEvents = 'none';

    var bgAlpha = 1;
    var w = canvas.width / dpr;
    var h = canvas.height / dpr;
    function animate() {
      ctx.clearRect(0, 0, w, h);

      // Fade background
      bgAlpha = Math.max(0, bgAlpha - 0.015);
      if (bgAlpha > 0) {
        ctx.globalAlpha = bgAlpha;
        ctx.fillStyle = '#02040d';
        ctx.fillRect(0, 0, w, h);
      }

      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        if (p.alpha <= 0) continue;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.02;
        p.alpha = Math.max(0, p.alpha - p.decay);
        if (p.alpha <= 0) continue;
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = i % 5 === 0 ? '#d7a7ff' : '#c8f4ff';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      requestAnimationFrame(animate);
    }
    animate();
    document.documentElement.classList.remove('loading');

    // Clean up after particles fully fade (~1.5s)
    setTimeout(function() { loader.classList.add('hidden'); }, 3000);
  }, 3500);
</script>
<script>
  (function() {
    var el = document.querySelector('.site-name');
    var extra = document.querySelector('.nav-extra');
    var bar = document.querySelector('.top-bar');
    var fade = document.querySelector('.top-fade');
    var linksSection = document.getElementById('links-section');
    var contactSection = document.getElementById('contact-section');
    var startSize = parseFloat(getComputedStyle(el).fontSize);
    var endSize = startSize / 3;
    var scrollRange = 250;

    function loop() {
      var y = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
      var t = Math.max(0, Math.min(y / scrollRange, 1));

      // Smoothly shrink font-size from big to small
      var size = startSize + (endSize - startSize) * t;
      el.style.fontSize = size + 'px';

      el.style.background = 'none';

      // Append section label when scrolled into a named section
      var linksTop = linksSection.getBoundingClientRect().top;
      var contactTop = contactSection.getBoundingClientRect().top;
      var label = '';
      if (linksTop < 100) label = ' \u2192 Links';
      if (contactTop < 100) label = ' \u2192 Get in Touch';
      if (label) {
        extra.textContent = label;
        extra.style.opacity = '1';
      } else {
        extra.style.opacity = '0';
      }

      // Size the bar and fade mask
      var nameH = el.offsetHeight;
      bar.style.height = nameH + 'px';
      fade.style.height = (nameH + 40) + 'px';

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  })();
</script>
<script>

  var _a, _b, _ans;
  function showCaptcha() {
    _a = Math.floor(Math.random() * 9) + 1;
    _b = Math.floor(Math.random() * 9) + 1;
    _ans = _a + _b;
    document.getElementById('captcha-question').textContent = 'What is ' + _a + ' + ' + _b + '?';
    document.getElementById('captcha-box').classList.add('visible');
    document.getElementById('captcha-trigger').style.display = 'none';
    document.getElementById('captcha-error').style.display = 'none';
    document.getElementById('captcha-input').value = '';
    document.getElementById('captcha-input').focus();
  }
  function checkCaptcha() {
    var val = parseInt(document.getElementById('captcha-input').value, 10);
    if (val === _ans) {
      var e = atob('aGVsbG9AYWJoaW1hbmd1cHRhLmNvbQ==');
      var link = document.getElementById('email-link');
      link.href = 'mailto:' + e;
      link.textContent = e;
      document.getElementById('captcha-box').style.display = 'none';
      document.getElementById('email-result').style.display = 'block';
    } else {
      var err = document.getElementById('captcha-error');
      err.style.display = 'inline';
      _a = Math.floor(Math.random() * 9) + 1;
      _b = Math.floor(Math.random() * 9) + 1;
      _ans = _a + _b;
      document.getElementById('captcha-question').textContent = 'What is ' + _a + ' + ' + _b + '?';
      document.getElementById('captcha-input').value = '';
      document.getElementById('captcha-input').focus();
    }
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('captcha-box').classList.contains('visible')) {
      checkCaptcha();
    }
  });
</script>
